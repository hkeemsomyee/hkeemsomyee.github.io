<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3471082371880025" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة طيبة المحبين وروضة المحبوبين | السيد عبد الله هاشم السروري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Cairo', sans-serif; margin: 0; background-color: #e9f7ef; color: #1b4332; line-height: 1.6; }
    header { background-color: #2d6a4f; color: white; text-align: center; padding: 15px 0; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    header img { height: 60px; width: auto; margin-bottom: 5px; }
    header h1 { margin: 0; font-size: 18px; font-weight: bold; }
    main { padding-top: 150px; max-width: 1000px; margin: auto; padding-bottom: 50px; }
    
    .books-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; padding: 20px; }
    .book-item { background: #fff; border-right: 5px solid #2d6a4f; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
    .book-item:hover { background-color: #f1f8f5; transform: scale(1.02); }
    
    .book-info { font-weight: bold; font-size: 14px; color: #1b4332; flex-grow: 1; margin-left: 10px; }
    
    .btn-group { display: flex; gap: 8px; }
    .btn-action { text-decoration: none; font-size: 12px; padding: 6px 12px; border-radius: 5px; font-weight: bold; transition: 0.3s; text-align: center; white-space: nowrap; }
    
    /* ألوان الأزرار */
    .btn-read { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .btn-read:hover { background-color: #2d6a4f; color: white; }
    
    .btn-down { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .btn-down:hover { background-color: #d62828; color: white; }

    footer { text-align: center; background-color: #2d6a4f; color: white; padding: 20px; margin-top: 40px; }
    .social a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; border: 1px solid white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="شعار مكتبة طيبة المحبين" />
    <h1>📚 مكتبة طيبة المحبين وروضة المحبوبين</h1>
  </header>

  <main>
    <section>
      <h2 style="text-align:center; color:#2d6a4f;">📖 محتويات ومؤلفات المكتبة (28 قسماً)</h2>
      <div class="books-list" id="main-library">
        </div>
    </section>

    <section style="text-align:center; margin-top:60px; padding: 20px; background: #fff; border-radius: 15px; margin-left: 20px; margin-right: 20px;">
      <h2>📞 تواصل معنا</h2>
      <div class="social">
        <a href="https://wa.me/00967734404355" target="_blank">واتساب</a>
        <a href="https://t.me/tebatalmhbeen" target="_blank">تليجرام</a>
      </div>
    </section>
  </main>

  <footer>
    جميع الحقوق محفوظة © 2026 مكتبة طيبة المحبين <br>
    <small>السيد عبد الله هاشم السروري</small>
  </footer>

  <script>
    const books = [
        "قسم تحاميد", "قسم جلالات", "قسم تصليات", 
        "قسم قصائد ذكرى المولد النبوي", "قسم الإِبْهاج في قصة الإسراء والمعراج", 
        "العمدَةُ على نَهْجِ البُردة", "الرَّندَةُ على نَهْجِ البُردة", "الزُبْدَةُ على نَهْجِ البُردة", 
        "القصيدة المحمدية", "الرمزية على نهج الهمزية", "(( قصيدة ))", 
        "حَقِيقَةُ الْحَقَائِق وَرَقِيقَةُ الرَّقَائِق", "الْقَصِيدَةُ الْغَزَلِيَّةُ فِي الْحَقِيقَةِ الْأَزَلِيَّةِ", 
        "(( وَاللَّـهِ مَا عَرَفَ النَّبِيَّ سِوَاهُ ))", "الوسيلة الحسناء بأسماء الله الحسنى", 
        "التوسل الأسنى بأسماء الله الحسنى", "التوسل المزان بسور القرآن", 
        "دُرَّةُ الدُّرَرِ وَغُرَّةُ الغُرَرْ", "يَا مُجَلِّيْ الْقَمَرْ بِالنُّورْ", 
        "العدة في كشف الشدة", "ريحانة القلب المهدي في تخميس لامية ابن الوردي", 
        "أنْفَاسٌ هَاشِمِيَّةْ فِي وَصْفِ المَدِينَةِ التَّرِيْمِيَّةْ", "حِلْيَةُ الخَدَمِ فِي الحَمْدِللَّهِ الأتَمْ", 
        "النظم الاغر في ذكر اسماء السور", "أسْنَى المَطْلَبْ بِاستِغْفَارِ شهرِ رجبْ", 
        "الدُّرُّ المُنَظَّمْ فِيمَا يَخْتَصُّ بِهِ الإسْمُ الأعْظَمْ", "طَائِرَةُ السُّبَّاقِ وَبَاخِرَةُ اللُّحَّاقِ", 
        "المؤلف في سطور"
    ];

    const container = document.getElementById('main-library');

    books.forEach((title, index) => {
        const id = index + 1;
        const fileName = `te${id}.pdf`;
        
        const item = document.createElement('div');
        item.className = 'book-item';
        item.innerHTML = `
            <div class="book-info">${id}. ${title}</div>
            <div class="btn-group">
                <a href="${fileName}" target="_blank" class="btn-action btn-read">📖 قراءة</a>
                <a href="${fileName}" download="${title}.pdf" class="btn-action btn-down">📥 تحميل</a>
            </div>
        `;
        container.appendChild(item);
    });
  </script>
</body>
</html>
